---
# Welcome to your prefect.yaml file! You can use this file for
# storing and managing configuration for deploying your flows.
# We recommend committing this file to source control along
# with your flow code.

# Generic metadata about this project
name: first_prefect
prefect-version: 3.6.21

# build section allows you to manage and build docker images
build:
- prefect_docker.deployments.steps.build_docker_image:
    id: build_image
    requires: prefect-docker>=0.3.1
    image_name: fatman3194/my-project-prefect
    tag: latest
    dockerfile: Dockerfile

# push section allows you to manage if and how this project
# is uploaded to remote locations
push:
- prefect_docker.deployments.steps.push_docker_image:
    requires: prefect-docker>=0.3.1
    image_name: '{{ build_image.image_name }}'
    tag: '{{ build_image.tag }}'

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: .
      
# the deployments section allows you to provide configuration
# for deploying flows
deployments:
- name: "train_a_model"
  version: null
  tags: []
  description: "Entraînement du modèle Iris avec tracking MLflow sur le Serveur 2"
  schedule: {cron: "*/5 * * * *"}
  flow_name: null
  entrypoint: ./train.py:flow_train
  parameters: {}
  work_pool:
    name: "train-pool"
    work_queue_name: null
    job_variables:
      image: fatman3194/my-project-prefect:latest
      auto_remove: true
      env:
        MLFLOW_HOST: "host.docker.internal"
        MINIO_HOST: "host.docker.internal"
