services:
  ### 1. LA BASE DE DONNÉES
  database:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=prefect
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=prefect
    command: >
      postgres
      -c shared_buffers=128MB
      -c max_connections=20
      -c work_mem=16MB
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - prefect-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'

  ### 2. LE SERVEUR PREFECT
  server:
    image: prefecthq/prefect:3-latest
    restart: always
    volumes:
      - prefect_data:/root/.prefect
    entrypoint: ["prefect", "server", "start"]
    environment:
      - PREFECT_API_DATABASE_CONNECTION_URL=postgresql+asyncpg://prefect:${POSTGRES_PASSWORD}@database:5432/prefect
      - PREFECT_SERVER_API_HOST=0.0.0.0
      - PREFECT_API_URL=http://server:4200/api
      - PREFECT_UI_API_URL=http://localhost:4200/api
      - MINIO_ROOT_USER=${AWS_ACCESS_KEY_ID}
      - MINIO_ROOT_PASSWORD=${AWS_SECRET_ACCESS_KEY}
    ports:
      - "4200:4200"
    depends_on:
      - database
    networks:
      - prefect-network
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '0.50'
  # Les workers sont lancés séparément sur chaque serveur :
  # PREFECT_API_URL="http://<ip-serveur>:4200/api" prefect worker start --pool "docker-pool"

networks:
  prefect-network:
    driver: bridge
    external: true

volumes:
  db_data:
  prefect_data:
